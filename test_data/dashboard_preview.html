<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'unsafe-inline' https://cdn.tailwindcss.com; img-src data:;">
  <title>DataGuard Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { background: #1e1e2e; color: #cdd6f4; font-family: 'Segoe UI', sans-serif; }
    .card { background: #313244; border-radius: 12px; padding: 1.25rem; }
    .badge-warn { background: #f38ba8; color: #1e1e2e; border-radius: 9999px; padding: 2px 10px; font-size: 0.75rem; font-weight: 700; }
    .badge-ok   { background: #a6e3a1; color: #1e1e2e; border-radius: 9999px; padding: 2px 10px; font-size: 0.75rem; font-weight: 700; }
    .gauge-ring { stroke-dasharray: 283; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #45475a; color: #cba6f7; text-align: left; padding: 8px 12px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 8px 12px; font-size: 0.85rem; border-bottom: 1px solid #45475a; }
    tr:hover td { background: #45475a44; }
  </style>
</head>
<body class="p-6 min-h-screen">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-purple-400">🛡 DataGuard AI</h1>
      <p id="file-name" class="text-sm text-gray-400 mt-1"></p>
    </div>
    <div class="flex items-center gap-4">
      <!-- Health Score Gauge -->
      <div class="flex flex-col items-center">
        <svg width="90" height="90" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="45" fill="none" stroke="#45475a" stroke-width="10"/>
          <circle id="gauge-circle" cx="50" cy="50" r="45" fill="none" stroke="#a6e3a1"
                  stroke-width="10" stroke-dasharray="283" stroke-dashoffset="283"
                  class="gauge-ring" transform="rotate(-90 50 50)"/>
          <text id="gauge-text" x="50" y="55" text-anchor="middle" font-size="18" font-weight="bold" fill="#cdd6f4">0</text>
        </svg>
        <span class="text-xs text-gray-400 mt-1">Health Score</span>
      </div>
    </div>
  </div>

  <!-- Stats Row -->
  <div class="grid grid-cols-3 gap-4 mb-6">
    <div class="card text-center">
      <div id="stat-rows" class="text-3xl font-bold text-blue-400">—</div>
      <div class="text-xs text-gray-400 mt-1">Rows</div>
    </div>
    <div class="card text-center">
      <div id="stat-cols" class="text-3xl font-bold text-purple-400">—</div>
      <div class="text-xs text-gray-400 mt-1">Columns</div>
    </div>
    <div class="card text-center">
      <div id="stat-missing" class="text-3xl font-bold text-red-400">—</div>
      <div class="text-xs text-gray-400 mt-1">Columns w/ Missing</div>
    </div>
  </div>

  <!-- AI Summary -->
  <div class="card mb-6 border-l-4 border-purple-500">
    <h2 class="text-sm font-semibold text-purple-300 mb-2">🤖 AI Summary</h2>
    <p id="summary-text" class="text-sm leading-relaxed text-gray-300"></p>
  </div>

  <!-- Outlier Badges -->
  <div class="card mb-6">
    <h2 class="text-sm font-semibold text-yellow-300 mb-3">⚠ Outlier Columns</h2>
    <div id="outlier-badges" class="flex flex-wrap gap-2">
      <span class="text-gray-500 text-sm">None detected</span>
    </div>
  </div>

  <!-- Charts Row -->
  <div class="grid grid-cols-2 gap-4 mb-6">
    <div class="card">
      <h2 class="text-sm font-semibold text-blue-300 mb-3">Missing Values (%)</h2>
      <canvas id="missing-chart" height="200"></canvas>
    </div>
    <div class="card">
      <h2 class="text-sm font-semibold text-green-300 mb-3">Data Types Distribution</h2>
      <canvas id="dtype-chart" height="200"></canvas>
    </div>
  </div>

  <!-- Column Stats Table -->
  <div class="card">
    <h2 class="text-sm font-semibold text-gray-300 mb-3">📋 Column Details</h2>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>Column</th>
            <th>Type</th>
            <th>Missing</th>
            <th>Missing %</th>
            <th>Outlier?</th>
          </tr>
        </thead>
        <tbody id="column-table-body"></tbody>
      </table>
    </div>
  </div>

<script>
(function() {
  const data = {"filePath": "C:\\Users\\ASUS\\.gemini\\Data\\DataGuard\\test_data\\titanic.csv", "shape": [891, 12], "columns": ["PassengerId", "Survived", "Pclass", "Name", "Sex", "Age", "SibSp", "Parch", "Ticket", "Fare", "Cabin", "Embarked"], "missingValues": {"Age": 177, "Cabin": 687, "Embarked": 2}, "missingPercent": {"Age": 19.87, "Cabin": 77.1, "Embarked": 0.22}, "outlierColumns": ["SibSp", "Fare"], "classImbalance": {"Sex": {"male": 577, "female": 314}, "Embarked": {"S": 644, "C": 168, "Q": 77}}, "dtypes": {"PassengerId": "int64", "Survived": "int64", "Pclass": "int64", "Name": "str", "Sex": "str", "Age": "float64", "SibSp": "int64", "Parch": "int64", "Ticket": "str", "Fare": "float64", "Cabin": "str", "Embarked": "str"}, "summary": "\u26a0 Column 'Cabin' has 77.1% missing values \u2014 consider imputation or removal. \u26a0 Outliers detected in: SibSp, Fare. Consider capping or log-transformation."};

  // File name
  const parts = (data.filePath || '').replace(/\\/g, '/').split('/');
  document.getElementById('file-name').textContent = parts[parts.length - 1] || data.filePath;

  // Stats
  document.getElementById('stat-rows').textContent = (data.shape && data.shape[0] != null) ? data.shape[0].toLocaleString() : '—';
  document.getElementById('stat-cols').textContent = (data.shape && data.shape[1] != null) ? data.shape[1].toLocaleString() : '—';
  document.getElementById('stat-missing').textContent = Object.keys(data.missingValues || {}).length;

  // Health score
  const OUTLIER_PENALTY = 5;
  const avgMissing = Object.keys(data.missingPercent || {}).length > 0
    ? Object.values(data.missingPercent).reduce((a, b) => a + b, 0) / Object.keys(data.missingPercent).length
    : 0;
  const outlierPenalty = (data.outlierColumns || []).length * OUTLIER_PENALTY;
  const healthScore = Math.max(0, Math.min(100, Math.round(100 - avgMissing * 0.5 - outlierPenalty)));

  document.getElementById('gauge-text').textContent = healthScore;
  const gaugeColor = healthScore >= 80 ? '#a6e3a1' : healthScore >= 50 ? '#f9e2af' : '#f38ba8';
  const circle = document.getElementById('gauge-circle');
  circle.setAttribute('stroke', gaugeColor);
  // dashoffset: 283 = full circle (0%), 0 = empty (100%)
  setTimeout(() => {
    circle.style.strokeDashoffset = 283 - (283 * healthScore / 100);
  }, 100);

  // Summary
  document.getElementById('summary-text').textContent = data.summary || 'No summary available.';

  // Outlier badges
  const badgesEl = document.getElementById('outlier-badges');
  if (data.outlierColumns && data.outlierColumns.length > 0) {
    badgesEl.innerHTML = data.outlierColumns.map(col =>
      `<span class="badge-warn">${col}</span>`
    ).join('');
  }

  // Missing Values Chart
  const missingCols = Object.keys(data.missingPercent || {});
  const missingPcts = missingCols.map(c => data.missingPercent[c]);
  if (missingCols.length > 0) {
    new Chart(document.getElementById('missing-chart'), {
      type: 'bar',
      data: {
        labels: missingCols,
        datasets: [{
          label: 'Missing %',
          data: missingPcts,
          backgroundColor: missingPcts.map(p => p > 20 ? '#f38ba8' : p > 5 ? '#f9e2af' : '#89b4fa'),
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#cdd6f4', maxRotation: 45 }, grid: { color: '#45475a' } },
          y: { ticks: { color: '#cdd6f4' }, grid: { color: '#45475a' }, max: 100, title: { display: true, text: '% Missing', color: '#cdd6f4' } }
        }
      }
    });
  } else {
    document.getElementById('missing-chart').parentElement.innerHTML += '<p class="text-green-400 text-sm mt-2">✅ No missing values!</p>';
  }

  // Data Types Donut Chart
  const dtypes = data.dtypes || {};
  const typeCounts = {};
  Object.values(dtypes).forEach(t => {
    const key = String(t).replace(/\d+/g, 'N');
    typeCounts[key] = (typeCounts[key] || 0) + 1;
  });
  const typeLabels = Object.keys(typeCounts);
  const typePalette = ['#cba6f7','#89b4fa','#a6e3a1','#f9e2af','#f38ba8','#fab387','#94e2d5'];
  new Chart(document.getElementById('dtype-chart'), {
    type: 'doughnut',
    data: {
      labels: typeLabels,
      datasets: [{
        data: typeLabels.map(k => typeCounts[k]),
        backgroundColor: typePalette.slice(0, typeLabels.length),
        borderWidth: 2,
        borderColor: '#313244',
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'right', labels: { color: '#cdd6f4', font: { size: 11 } } }
      }
    }
  });

  // Column Table
  const tbody = document.getElementById('column-table-body');
  (data.columns || []).forEach(col => {
    const dtype = (data.dtypes || {})[col] || '—';
    const missing = (data.missingValues || {})[col] || 0;
    const missingPct = (data.missingPercent || {})[col];
    const isOutlier = (data.outlierColumns || []).includes(col);
    const row = document.createElement('tr');
    row.innerHTML = `
      <td class="font-mono text-blue-300">${col}</td>
      <td><span class="text-xs bg-purple-900 text-purple-200 px-2 py-0.5 rounded">${dtype}</span></td>
      <td>${missing > 0 ? `<span class="text-red-400">${missing}</span>` : '<span class="text-green-400">0</span>'}</td>
      <td>${missingPct != null ? `<span class="${missingPct > 20 ? 'text-red-400' : missingPct > 5 ? 'text-yellow-400' : 'text-green-400'}">${missingPct.toFixed(1)}%</span>` : '<span class="text-green-400">0%</span>'}</td>
      <td>${isOutlier ? '<span class="badge-warn">Yes</span>' : '<span class="badge-ok">No</span>'}</td>
    `;
    tbody.appendChild(row);
  });
})();
</script>
</body>
</html>
